name: 'build-test'
on: # rebuild any PRs and main branch changes
  push:
    branches:
      - release/*
      - main

jobs:
  build: # make sure build/ci work properly
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: |
          npm ci
      - run: |
          npm run all
